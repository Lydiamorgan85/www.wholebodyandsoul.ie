<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Slide 1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        
        .slide {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #dad0e8 0%, #c9b8d9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            box-sizing: border-box;
            position: relative;
        }
        
        .border {
            position: absolute;
            top: 60px;
            left: 60px;
            right: 60px;
            bottom: 60px;
            border: 3px solid rgba(107, 91, 115, 0.4);
        }
        
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        
        .logo-circle {
            width: 180px;
            height: 180px;
            margin: 0 auto 40px;
            border: 4px solid #6b5b73;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .logo-svg {
            width: 120px;
            height: 120px;
        }
        
        h1 {
            font-family: 'Georgia', serif;
            font-size: 96px;
            color: #5a4859;
            margin: 40px 0 30px;
            font-weight: bold;
            letter-spacing: 4px;
        }
        
        .subtitle {
            font-family: 'Georgia', serif;
            font-size: 48px;
            color: #6b5b73;
            font-style: italic;
            letter-spacing: 2px;
            margin-top: 20px;
        }
        
        .decorative {
            font-size: 40px;
            color: #a89aab;
            margin: 30px 0;
            letter-spacing: 20px;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="border"></div>
        <div class="content">
            <div class="logo-circle">
                <svg class="logo-svg" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="25" cy="25" r="8" fill="none" stroke="#6b5b73" stroke-width="1.5"/>
                    <circle cx="25" cy="17" r="8" fill="none" stroke="#8b7a8f" stroke-width="1.2"/>
                    <circle cx="32" cy="21" r="8" fill="none" stroke="#8b7a8f" stroke-width="1.2"/>
                    <circle cx="32" cy="29" r="8" fill="none" stroke="#8b7a8f" stroke-width="1.2"/>
                    <circle cx="25" cy="33" r="8" fill="none" stroke="#8b7a8f" stroke-width="1.2"/>
                    <circle cx="18" cy="29" r="8" fill="none" stroke="#8b7a8f" stroke-width="1.2"/>
                    <circle cx="18" cy="21" r="8" fill="none" stroke="#8b7a8f" stroke-width="1.2"/>
                    <circle cx="25" cy="25" r="2" fill="#6b5b73"/>
                    <circle cx="22" cy="25" r="1.5" fill="#6b5b73"/>
                    <circle cx="28" cy="25" r="1.5" fill="#6b5b73"/>
                </svg>
            </div>
            
            <h1>Welcome</h1>
            
            <div class="decorative">✧ ༺ ♡ ༻ ✧</div>
            
            <div class="subtitle">We're Miya & Lydia</div>
        </div>
    </div>
</body>
</html>
