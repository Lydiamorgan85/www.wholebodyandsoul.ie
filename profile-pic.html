<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile Picture</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .profile-pic {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #8b7a8f 0%, #6b5b73 50%, #5a4a59 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Celtic border circle */
        .celtic-circle {
            position: absolute;
            width: 900px;
            height: 900px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
        
        /* Flower of Life - centered */
        .flower-container {
            position: relative;
            z-index: 2;
        }
        
        .flower-of-life {
            width: 400px;
            height: 400px;
        }
        
        /* Brand text */
        .brand-text {
            position: absolute;
            bottom: 200px;
            text-align: center;
            z-index: 3;
        }
        
        .brand-name {
            font-family: 'Georgia', serif;
            font-size: 72px;
            color: white;
            letter-spacing: 8px;
            font-weight: normal;
            margin-bottom: 15px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        
        .brand-tagline {
            font-family: 'Georgia', serif;
            font-size: 36px;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            letter-spacing: 3px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.3);
        }
        
        /* Decorative dots representing two soul sisters */
        .soul-dots {
            position: absolute;
            top: 150px;
            display: flex;
            gap: 60px;
        }
        
        .dot {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="profile-pic">
        <div class="celtic-circle"></div>
        
        <div class="soul-dots">
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="flower-container">
            <svg class="flower-of-life" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Center circle -->
                <circle cx="100" cy="100" r="30" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
                
                <!-- Inner ring (6 circles) -->
                <circle cx="100" cy="70" r="30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
                <circle cx="126" cy="85" r="30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
                <circle cx="126" cy="115" r="30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
                <circle cx="100" cy="130" r="30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
                <circle cx="74" cy="115" r="30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
                <circle cx="74" cy="85" r="30" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
                
                <!-- Outer ring (12 circles) -->
                <circle cx="100" cy="40" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="115" cy="47" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="141" cy="60" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="152" cy="85" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="152" cy="115" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="141" cy="140" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="115" cy="153" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="100" cy="160" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="85" cy="153" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="59" cy="140" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="48" cy="115" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="48" cy="85" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="59" cy="60" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                <circle cx="85" cy="47" r="30" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
                
                <!-- Center dots for soul sisters -->
                <circle cx="95" cy="100" r="5" fill="white" opacity="0.9"/>
                <circle cx="105" cy="100" r="5" fill="white" opacity="0.9"/>
            </svg>
        </div>
        
        <div class="brand-text">
            <div class="brand-name">WBS</div>
            <div class="brand-tagline">Whole Body & Soul</div>
        </div>
    </div>
</body>
</html>
